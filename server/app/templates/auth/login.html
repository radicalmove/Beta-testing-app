<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Sign in</title><link rel="stylesheet" href="/static/app.css"></head>
<body><main class="auth-card"><p class="eyebrow">Moodle Course Review</p><h1>Sign in</h1><form method="post" action="/login"><input type="hidden" name="csrf_token" value="{{ csrf_token }}">{% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}<label>Email<input type="email" name="email" required></label><label>Password<input type="password" name="password" required></label><button>Sign in</button></form><p>Need an account? <a href="/register">Request access</a></p></main></body></html>
