<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Account approvals</title><link rel="stylesheet" href="/static/app.css"></head>
<body><main class="page"><p class="eyebrow">Administration</p><h1>Account approvals</h1><table><thead><tr><th>Name</th><th>Email</th><th>Status</th><th>Role</th><th>Actions</th></tr></thead><tbody>{% for member in users %}<tr><td>{{ member.display_name }}</td><td>{{ member.email }}</td><td><span class="chip {{ 'approved' if member.approved_at else 'pending' }}">{{ 'Approved' if member.approved_at else 'Pending' }}</span></td><td>{{ member.role.value }}</td><td>{% if not member.approved_at %}<form class="inline" method="post" action="/admin/users/{{ member.id }}/approve"><input type="hidden" name="csrf_token" value="{{ csrf_token }}"><button>Approve</button></form>{% endif %}<form class="inline" method="post" action="/admin/users/{{ member.id }}/role"><input type="hidden" name="csrf_token" value="{{ csrf_token }}"><select name="role">{% for role in roles %}<option value="{{ role.value }}" {% if member.role == role %}selected{% endif %}>{{ role.value }}</option>{% endfor %}</select><button>Save</button></form></td></tr>{% endfor %}</tbody></table></main></body></html>
